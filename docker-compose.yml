services:
  postgres:
    image: postgres:18.4-trixie
    container_name: ai-ad-postgres
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ai-ad-minio
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    environment:
      MINIO_BROWSER: "on"
      MINIO_BROWSER_REDIRECT_URL: http://127.0.0.1:9001
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
