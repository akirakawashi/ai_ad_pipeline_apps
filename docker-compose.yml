x-backend-service: &backend-service
  image: ai-ad-pipeline-backend:dev
  build:
    context: .
    dockerfile: apps/backend/Dockerfile
    target: backend
  env_file:
    - ./apps/backend/.env
  environment:
    POSTGRES_HOST: postgres
    MINIO_INTERNAL_ENDPOINT: http://minio:9000
    MINIO_PUBLIC_ENDPOINT: http://127.0.0.1:9000
    PYTHONPATH: /app/apps/backend/src:/app
    WATCHFILES_FORCE_POLLING: "true"
  volumes:
    - ./apps/backend/src:/app/apps/backend/src:ro
    - ./apps/backend/alembic:/app/apps/backend/alembic:ro
    - ./apps/backend/alembic.ini:/app/apps/backend/alembic.ini:ro

services:
  postgres:
    image: postgres:18.4-trixie
    container_name: ai-ad-postgres
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ai-ad-minio
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    environment:
      MINIO_BROWSER: "on"
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  migrate:
    <<: *backend-service
    command:
      - uv
      - run
      - --no-sync
      - alembic
      - -c
      - apps/backend/alembic.ini
      - upgrade
      - head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    <<: *backend-service
    command:
      - uv
      - run
      - --no-sync
      - uvicorn
      - main:app
      - --app-dir
      - apps/backend/src
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthcheck')",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
